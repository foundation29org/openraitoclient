<div
  #wrapper
  class="wrapper"
  [ngClass]="{
    'nav-collapsed': iscollapsed,
    'menu-collapsed': iscollapsed,
    'sidebar-sm': isSidebar_sm,
    'sidebar-lg': isSidebar_lg
  }"
  [dir]="options.direction"
  >

  <div
    #appSidebar
    appSidebar
    class="app-sidebar d-none"
    (toggleHideSidebar)="toggleHideSidebar($event)"
    [ngClass]="{ 'hide-sidebar': hideSidebar }"
    data-active-color="white"
    [attr.data-background-color]="bgColor"
    [attr.data-image]="bgImage"
    >
    <app-sidebar></app-sidebar>
    <div class="sidebar-background" #sidebarBgImage></div>
  </div>
  <app-navbar (toggleHideSidebar)="toggleHideSidebar($event)"></app-navbar>
  <div class="main-panel">
    <div class="main-content mb-2">
      <div clas="content-wrapper">
        <div class="container-fluid">
          @if (isIeOrEdge) {
            <ngb-alert type="warning" class="mt-4" [dismissible]="false">
              <div class="mt-3">
                <h4>{{'others.browsers not supported' | translate }}</h4>
                <a href="https://www.microsoftedgeinsider.com/en-us/" target="_blank">{{'generics.Download' | translate }} Microsoft Edge Insider</a>
              </div>
            </ngb-alert>
          }
          <router-outlet></router-outlet>
        </div>
      </div>
    </div>
    <!--<div *ngIf="!isApp">
    <app-footer *ngIf="role != 'Clinical' && role!='Admin'"></app-footer>
    <app-footer2 *ngIf="role == 'Clinical' || role=='Admin'"></app-footer2>
  </div>-->
  @if (isScrollTopVisible) {
    <button class="btn btn-primary scroll-top" type="button" (click)="scrollToTop()"><i class="ft-arrow-up"></i></button>
  }
</div>
</div>
