  class="wrapper"

    'menu-collapsed': iscollapsed,
    'sidebar-sm': isSidebar_sm,
    'sidebar-lg': isSidebar_lg
  }"
  [dir]="options.direction"
  >

<app-navbar-dx29 (toggleHideSidebar)="toggleHideSidebar($event)"></app-navbar-dx29>
<div class="main-panel">
  <div class="main-content">
    <div class="content-wrapper">
      @if (isIeOrEdge) {
        <ngb-alert type="warning" class="mt-4" [dismissible]="false">
          <div class="mt-3">
            <h4>{{'others.browsers not supported' | translate }}</h4>
            <a href="https://www.microsoftedgeinsider.com/en-us/" target="_blank">{{'generics.Download' | translate }} Microsoft Edge Insider</a>
          </div>
        </ngb-alert>
      }
      <router-outlet></router-outlet>
    </div>
  </div>
  @if (!isPatientPage) {
    <app-footer-land></app-footer-land>
  }
  <!--<app-footer *ngIf="!isHomePage"></app-footer>-->
  @if (isScrollTopVisible) {
    <button class="btn btn-primary scroll-top" type="button" (click)="scrollToTop()"><i class="ft-arrow-up"></i></button>
  }
</div>
</div>
