<div class="table-responsive">
  <table class="table tablePatients mb-0">
    <thead>
      <tr>
        @for (key of columnKeys; track key) {
          <th>{{ settings.columns[key]?.title }}</th>
        }
      </tr>
    </thead>
    <tbody>
      @for (row of rows; track row) {
        <tr (click)="onRowClick(row)" style="cursor: pointer">
          @for (key of columnKeys; track key) {
            <td [innerHTML]="cellValue(row, key)"></td>
          }
        </tr>
      }
    </tbody>
  </table>
</div>
