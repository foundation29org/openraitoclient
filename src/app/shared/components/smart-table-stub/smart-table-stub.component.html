<div class="table-responsive">
  <table class="table tablePatients mb-0">
    <thead>
      <tr>
        <th *ngFor="let key of columnKeys">{{ settings.columns[key]?.title }}</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let row of rows" (click)="onRowClick(row)" style="cursor: pointer">
        <td *ngFor="let key of columnKeys" [innerHTML]="cellValue(row, key)"></td>
      </tr>
    </tbody>
  </table>
</div>
